receivers:
  otlp:
    protocols:
      grpc:
        endpoint: 0.0.0.0:4317
      http:
        endpoint: 0.0.0.0:4318
        # CORS not needed — browser telemetry is proxied through /api/otel
        # If sending directly from browser, uncomment:
        # cors:
        #   allowed_origins:
        #     - "http://localhost:3000"
        #   allowed_headers:
        #     - "*"

processors:
  batch:
    timeout: 5s
    send_batch_size: 512

exporters:
  # Export traces to Jaeger via OTLP gRPC
  otlp_grpc/jaeger:
    endpoint: jaeger:4317
    tls:
      insecure: true

  # Log all signals to stdout for debugging
  debug:
    verbosity: basic

service:
  pipelines:
    traces:
      receivers: [otlp]
      processors: [batch]
      exporters: [otlp_grpc/jaeger, debug]
    metrics:
      receivers: [otlp]
      processors: [batch]
      exporters: [debug]
    logs:
      receivers: [otlp]
      processors: [batch]
      exporters: [debug]
