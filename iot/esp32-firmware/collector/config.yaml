# Edge Collector for the constrained-device path. It receives OTLP from the
# sme-bridge (which has already turned SME-v1 JSON into OTel) and exports to
# base14 Scout.
#
# This reuses the Phase 2 edge store-and-forward building block: a disk-backed
# sending_queue so an intermittent backhaul - the normal condition for an edge
# site - loses nothing. Phase 2 splits this across an edge + upstream pair to
# demonstrate cutting the link; here it is collapsed into one Collector that
# talks straight to Scout. See ./README.md for wiring the full two-tier topology.
#
# Scout env keys match ~/.config/base14/scout-otel-config.env:
#   SCOUT_CLIENT_ID / SCOUT_CLIENT_SECRET / SCOUT_TOKEN_URL / SCOUT_OTLP_ENDPOINT

extensions:
  # Disk-backed queue. The sending_queue below persists here, so anything not
  # yet acked by Scout survives a Collector restart or a backhaul outage.
  file_storage:
    directory: /var/lib/otelcol/storage
    timeout: 10s
  oauth2client:
    client_id: ${SCOUT_CLIENT_ID}
    client_secret: ${SCOUT_CLIENT_SECRET}
    token_url: ${SCOUT_TOKEN_URL}
    endpoint_params:
      audience: b14collector
    timeout: 10s
    tls:
      insecure_skip_verify: true
  health_check:
    endpoint: 0.0.0.0:13133

receivers:
  otlp:
    protocols:
      grpc:
        endpoint: 0.0.0.0:4317
      http:
        endpoint: 0.0.0.0:4318

processors:
  memory_limiter:
    limit_mib: 256
    check_interval: 1s
  batch:
    timeout: 10s
    send_batch_size: 1024
  resource:
    attributes:
      - key: deployment.environment
        value: ${SCOUT_ENVIRONMENT}
        action: upsert

exporters:
  otlp_http/b14:
    endpoint: ${SCOUT_OTLP_ENDPOINT}
    auth:
      authenticator: oauth2client
    tls:
      insecure_skip_verify: true
    compression: gzip
    timeout: 30s
    # Persistent retry queue. With storage set, queued batches live on disk and
    # are replayed after a restart or once the backhaul comes back.
    sending_queue:
      enabled: true
      storage: file_storage
      queue_size: 1000
    retry_on_failure:
      enabled: true
      initial_interval: 1s
      max_interval: 30s
      max_elapsed_time: 300s
  debug:
    verbosity: basic

service:
  extensions: [file_storage, oauth2client, health_check]
  pipelines:
    metrics:
      receivers: [otlp]
      processors: [memory_limiter, resource, batch]
      exporters: [otlp_http/b14, debug]
    traces:
      receivers: [otlp]
      processors: [memory_limiter, resource, batch]
      exporters: [otlp_http/b14, debug]
    logs:
      receivers: [otlp]
      processors: [memory_limiter, resource, batch]
      exporters: [otlp_http/b14, debug]
