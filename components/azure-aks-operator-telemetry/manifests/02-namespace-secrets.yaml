# otel namespace.
#
# Why labels: the Go-eBPF sample app uses securityContext.privileged + hostPID.
# K8s PodSecurity admission default-restricted profiles will reject it without
# enforce=privileged on the namespace.
#
# Why no Secret/ConfigMap here: scout-oauth2 (Scout OAuth2 client creds) and
# otel-azure-context (subscription/region/cluster identifiers) are populated
# imperatively by scripts/install-addons.sh from sourced env vars, so plaintext
# never lands in the repo. They live in the same `otel` namespace.
---
apiVersion: v1
kind: Namespace
metadata:
  name: otel
  labels:
    pod-security.kubernetes.io/enforce: privileged
    pod-security.kubernetes.io/warn: privileged
    pod-security.kubernetes.io/audit: privileged
