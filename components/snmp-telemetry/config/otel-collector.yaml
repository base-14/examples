# Collects SNMP metrics from three simulated devices and emits OTLP.
#
# Device profiles are disambiguated by SNMPv2c community string, not port:
#   - linux-host    — HOST-RESOURCES-MIB + UCD-SNMP-MIB
#   - cisco-router  — IF-MIB (ifTable + ifXTable)
#   - apc-ups       — PowerNet-MIB (enterprise 318)
#
# Resource attributes follow the IoT Phase 0 schema:
#   device.id, device.kind, device.manufacturer, device.model.identifier,
#   site.id. Network gear uses device.kind=network (no separate
#   network.device.* namespace).

receivers:
  snmp/linux:
    collection_interval: 30s
    endpoint: udp://snmpsim:1161
    version: v2c
    community: linux-host

    resource_attributes:
      device.id:
        scalar_oid: "1.3.6.1.2.1.1.5.0"  # sysName
        description: SNMP sysName of the host
      cpu.index:
        indexed_value_prefix: "cpu_"
        description: Index of the CPU core from hrProcessorTable

    metrics:
      system.processes.count:
        description: Number of processes currently loaded or running (hrSystemProcesses)
        unit: "{processes}"
        gauge:
          value_type: int
        scalar_oids:
          - oid: "1.3.6.1.2.1.25.1.6.0"

      system.users.count:
        description: Number of user sessions (hrSystemNumUsers)
        unit: "{users}"
        gauge:
          value_type: int
        scalar_oids:
          - oid: "1.3.6.1.2.1.25.1.5.0"

      system.memory.total:
        description: Total real/physical memory (UCD memTotalReal)
        unit: KiBy
        gauge:
          value_type: int
        scalar_oids:
          - oid: "1.3.6.1.4.1.2021.4.5.0"

      system.memory.available:
        description: Available real memory (UCD memAvailReal)
        unit: KiBy
        gauge:
          value_type: int
        scalar_oids:
          - oid: "1.3.6.1.4.1.2021.4.6.0"

      system.memory.cached:
        description: Cached memory (UCD memCached)
        unit: KiBy
        gauge:
          value_type: int
        scalar_oids:
          - oid: "1.3.6.1.4.1.2021.4.11.0"

      system.memory.buffered:
        description: Buffered memory (UCD memBuffer)
        unit: KiBy
        gauge:
          value_type: int
        scalar_oids:
          - oid: "1.3.6.1.4.1.2021.4.14.0"

      system.cpu.load_average.1m:
        description: "1-minute load average × 100 (UCD laLoadInt.1)"
        unit: "1"
        gauge:
          value_type: int
        scalar_oids:
          - oid: "1.3.6.1.4.1.2021.10.1.5.1"

      system.cpu.load_average.5m:
        description: "5-minute load average × 100 (UCD laLoadInt.2)"
        unit: "1"
        gauge:
          value_type: int
        scalar_oids:
          - oid: "1.3.6.1.4.1.2021.10.1.5.2"

      system.cpu.load_average.15m:
        description: "15-minute load average × 100 (UCD laLoadInt.3)"
        unit: "1"
        gauge:
          value_type: int
        scalar_oids:
          - oid: "1.3.6.1.4.1.2021.10.1.5.3"

      system.cpu.utilization:
        description: Per-CPU utilization (HOST-RESOURCES hrProcessorLoad)
        unit: "%"
        gauge:
          value_type: int
        column_oids:
          - oid: "1.3.6.1.2.1.25.3.3.1.2"
            resource_attributes: [cpu.index]

  snmp/router:
    collection_interval: 30s
    endpoint: udp://snmpsim:1161
    version: v2c
    community: cisco-router

    resource_attributes:
      device.id:
        scalar_oid: "1.3.6.1.2.1.1.5.0"  # sysName
        description: SNMP sysName of the router
      network.interface.name:
        oid: "1.3.6.1.2.1.31.1.1.1.1"  # ifName (ifXTable)
        description: Interface name from IF-MIB ifName

    attributes:
      direction:
        description: I/O direction for interface counters
        enum: [receive, transmit]

    metrics:
      system.network.interfaces.count:
        description: Number of network interfaces (IF-MIB ifNumber)
        unit: "{interfaces}"
        gauge:
          value_type: int
        scalar_oids:
          - oid: "1.3.6.1.2.1.2.1.0"

      network.io:
        description: Interface I/O bytes (IF-MIB ifHCInOctets / ifHCOutOctets)
        unit: By
        sum:
          value_type: int
          monotonic: true
          aggregation: cumulative
        column_oids:
          - oid: "1.3.6.1.2.1.31.1.1.1.6"   # ifHCInOctets
            resource_attributes: [network.interface.name]
            attributes:
              - name: direction
                value: receive
          - oid: "1.3.6.1.2.1.31.1.1.1.10"  # ifHCOutOctets
            resource_attributes: [network.interface.name]
            attributes:
              - name: direction
                value: transmit

      network.errors:
        description: Interface errors (IF-MIB ifInErrors / ifOutErrors)
        unit: "{errors}"
        sum:
          value_type: int
          monotonic: true
          aggregation: cumulative
        column_oids:
          - oid: "1.3.6.1.2.1.2.2.1.14"  # ifInErrors
            resource_attributes: [network.interface.name]
            attributes:
              - name: direction
                value: receive
          - oid: "1.3.6.1.2.1.2.2.1.20"  # ifOutErrors
            resource_attributes: [network.interface.name]
            attributes:
              - name: direction
                value: transmit

      network.interface.speed:
        description: Interface nominal speed in Mbit/s (IF-MIB ifHighSpeed)
        unit: "Mbit/s"
        gauge:
          value_type: int
        column_oids:
          - oid: "1.3.6.1.2.1.31.1.1.1.15"
            resource_attributes: [network.interface.name]

      network.interface.admin_status:
        description: "Administrative status — 1=up, 2=down, 3=testing (IF-MIB ifAdminStatus)"
        unit: "1"
        gauge:
          value_type: int
        column_oids:
          - oid: "1.3.6.1.2.1.2.2.1.7"
            resource_attributes: [network.interface.name]

      network.interface.oper_status:
        description: "Operational status — 1=up, 2=down, 3=testing, 4=unknown, 5=dormant (IF-MIB ifOperStatus)"
        unit: "1"
        gauge:
          value_type: int
        column_oids:
          - oid: "1.3.6.1.2.1.2.2.1.8"
            resource_attributes: [network.interface.name]

  snmp/ups:
    collection_interval: 30s
    endpoint: udp://snmpsim:1161
    version: v2c
    community: apc-ups

    resource_attributes:
      device.id:
        scalar_oid: "1.3.6.1.2.1.1.5.0"  # sysName
        description: SNMP sysName of the UPS

    metrics:
      ups.battery.status:
        description: "Battery status — 1=unknown, 2=normal, 3=low, 4=replace"
        unit: "1"
        gauge:
          value_type: int
        scalar_oids:
          - oid: "1.3.6.1.4.1.318.1.1.1.2.1.1.0"

      ups.battery.capacity:
        description: Remaining battery capacity (upsAdvBatteryCapacity)
        unit: "%"
        gauge:
          value_type: int
        scalar_oids:
          - oid: "1.3.6.1.4.1.318.1.1.1.2.2.1.0"

      ups.battery.temperature:
        description: Battery temperature (upsAdvBatteryTemperature)
        unit: "Cel"
        gauge:
          value_type: int
        scalar_oids:
          - oid: "1.3.6.1.4.1.318.1.1.1.2.2.2.0"

      ups.battery.runtime_remaining:
        description: Estimated battery runtime remaining, in centiseconds (TimeTicks)
        unit: "cs"
        gauge:
          value_type: int
        scalar_oids:
          - oid: "1.3.6.1.4.1.318.1.1.1.2.2.3.0"

      ups.battery.replace_indicator:
        description: "1=noBatteryNeedsReplacing, 2=batteryNeedsReplacing"
        unit: "1"
        gauge:
          value_type: int
        scalar_oids:
          - oid: "1.3.6.1.4.1.318.1.1.1.2.2.4.0"

      ups.input.voltage:
        description: Input line voltage (upsAdvInputLineVoltage)
        unit: "V"
        gauge:
          value_type: int
        scalar_oids:
          - oid: "1.3.6.1.4.1.318.1.1.1.3.2.1.0"

      ups.input.frequency:
        description: Input line frequency (upsAdvInputFrequency)
        unit: "Hz"
        gauge:
          value_type: int
        scalar_oids:
          - oid: "1.3.6.1.4.1.318.1.1.1.3.2.4.0"

      ups.output.status:
        description: "Output status — 2=onLine, 3=onBattery, 4=onSmartBoost, etc."
        unit: "1"
        gauge:
          value_type: int
        scalar_oids:
          - oid: "1.3.6.1.4.1.318.1.1.1.4.1.1.0"

      ups.output.voltage:
        description: Output voltage (upsAdvOutputVoltage)
        unit: "V"
        gauge:
          value_type: int
        scalar_oids:
          - oid: "1.3.6.1.4.1.318.1.1.1.4.2.1.0"

      ups.output.load:
        description: Output load as percentage of rated capacity (upsAdvOutputLoad)
        unit: "%"
        gauge:
          value_type: int
        scalar_oids:
          - oid: "1.3.6.1.4.1.318.1.1.1.4.2.3.0"

      ups.output.current:
        description: Output current (upsAdvOutputCurrent)
        unit: "A"
        gauge:
          value_type: int
        scalar_oids:
          - oid: "1.3.6.1.4.1.318.1.1.1.4.2.4.0"

processors:
  memory_limiter:
    check_interval: 5s
    limit_percentage: 80
    spike_limit_percentage: 25

  batch:
    timeout: 10s
    send_batch_size: 1024

  # Static resource attributes applied per-device-pipeline.
  # snmpreceiver can attach only values that are themselves
  # retrievable via SNMP; constant labels like device.kind and
  # site.id are added here.
  resource/linux:
    attributes:
      - { key: service.name,             value: "linux-host-01",            action: insert }
      - { key: service.namespace,        value: "${env:SERVICE_NAMESPACE}", action: insert }
      - { key: deployment.environment,   value: "${env:ENVIRONMENT}",       action: insert }
      - { key: device.kind,              value: compute,                    action: insert }
      - { key: device.manufacturer,      value: "generic-linux",            action: insert }
      - { key: device.model.identifier,  value: "net-snmp",                 action: insert }
      - { key: site.id,                  value: "${env:SITE_ID}",           action: insert }

  resource/router:
    attributes:
      - { key: service.name,             value: "cisco-router-01",          action: insert }
      - { key: service.namespace,        value: "${env:SERVICE_NAMESPACE}", action: insert }
      - { key: deployment.environment,   value: "${env:ENVIRONMENT}",       action: insert }
      - { key: device.kind,              value: network,                    action: insert }
      - { key: device.manufacturer,      value: "cisco",                    action: insert }
      - { key: device.model.identifier,  value: "ISR-C2900",                action: insert }
      - { key: site.id,                  value: "${env:SITE_ID}",           action: insert }

  resource/ups:
    attributes:
      - { key: service.name,             value: "apc-ups-01",               action: insert }
      - { key: service.namespace,        value: "${env:SERVICE_NAMESPACE}", action: insert }
      - { key: deployment.environment,   value: "${env:ENVIRONMENT}",       action: insert }
      - { key: device.kind,              value: power,                      action: insert }
      - { key: device.manufacturer,      value: "apc",                      action: insert }
      - { key: device.model.identifier,  value: "Smart-UPS-SRT",            action: insert }
      - { key: site.id,                  value: "${env:SITE_ID}",           action: insert }

exporters:
  debug:
    verbosity: detailed

  # Forward metrics to an upstream Collector (e.g., the tenant-local
  # otel-collector-base14 that ships to Scout). This compose joins
  # the `otel-collector-network` so DNS resolves the container name.
  otlphttp/upstream:
    endpoint: http://otel-collector-base14:4318

  # Scout direct (alternative path — bypass the local gateway):
  # otlphttp/scout:
  #   endpoint: https://otel.<your-tenant>.base14.io
  #   headers:
  #     authorization: "Bearer ${env:SCOUT_OTLP_TOKEN}"

service:
  pipelines:
    metrics/linux:
      receivers: [snmp/linux]
      processors: [memory_limiter, resource/linux, batch]
      exporters: [debug, otlphttp/upstream]
    metrics/router:
      receivers: [snmp/router]
      processors: [memory_limiter, resource/router, batch]
      exporters: [debug, otlphttp/upstream]
    metrics/ups:
      receivers: [snmp/ups]
      processors: [memory_limiter, resource/ups, batch]
      exporters: [debug, otlphttp/upstream]
