services:
  sqlserver:
    image: mcr.microsoft.com/mssql/server:2022-latest
    platform: linux/amd64
    container_name: sqlserver
    environment:
      - ACCEPT_EULA=Y
      - MSSQL_SA_PASSWORD=${MSSQL_SA_PASSWORD}
      - MSSQL_PID=Developer
    ports:
      - "1433:1433"
    healthcheck:
      test:
        - CMD-SHELL
        - "/opt/mssql-tools18/bin/sqlcmd -S localhost -U sa -P \"$$MSSQL_SA_PASSWORD\" -C -Q 'SELECT 1' || exit 1"
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 60s
    volumes:
      - mssql-data:/var/opt/mssql

  init-monitor-user:
    image: mcr.microsoft.com/mssql/server:2022-latest
    platform: linux/amd64
    container_name: sqlserver-init
    depends_on:
      sqlserver:
        condition: service_healthy
    environment:
      - MSSQL_SA_PASSWORD=${MSSQL_SA_PASSWORD}
      - SQLSERVER_PASSWORD=${SQLSERVER_PASSWORD}
    volumes:
      - ./init:/init:ro
    entrypoint:
      - /bin/bash
      - -c
      - "/opt/mssql-tools18/bin/sqlcmd -S sqlserver -U sa -P \"$$MSSQL_SA_PASSWORD\" -C -v MONITOR_PASSWORD=\"$$SQLSERVER_PASSWORD\" -i /init/01-create-monitor-user.sql"
    restart: "no"

  otel-collector:
    image: otel/opentelemetry-collector-contrib:0.151.0
    container_name: otel-collector
    environment:
      - GODEBUG=x509negativeserial=1
      - SQLSERVER_USER=${SQLSERVER_USER}
      - SQLSERVER_PASSWORD=${SQLSERVER_PASSWORD}
      - ENVIRONMENT=${ENVIRONMENT:-development}
      - SERVICE_NAME=${SERVICE_NAME:-sqlserver-telemetry}
      - OTEL_EXPORTER_OTLP_ENDPOINT=${OTEL_EXPORTER_OTLP_ENDPOINT:-http://localhost:4318}
    volumes:
      - ./otel-collector-config.yaml:/etc/otelcol-contrib/config.yaml:ro
    depends_on:
      sqlserver:
        condition: service_healthy
      init-monitor-user:
        condition: service_completed_successfully

volumes:
  mssql-data:
